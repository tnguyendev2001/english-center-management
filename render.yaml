services:
  - type: web
    name: school-management-backend-staging
    runtime: docker
    plan: free
    region: singapore
    branch: develop
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    autoDeploy: true
    buildFilter:
      paths:
        - backend/**
        - render.yaml
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_MAX_POOL_SIZE
        value: "5"
      - key: DB_MIN_IDLE
        value: "0"
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
